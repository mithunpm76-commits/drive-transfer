<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Transfer - Deep Recursive Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* ==================== LOGIN PAGE ==================== */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-page.hidden {
            display: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(66, 133, 244, 0.4); }
            50% { box-shadow: 0 0 50px rgba(66, 133, 244, 0.6); }
        }

        .login-logo i {
            font-size: 40px;
            color: white;
        }

        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 14px;
            width: 100%; padding: 18px 24px; background: white; border: none;
            border-radius: 14px; font-weight: 600; color: #374151; cursor: pointer; transition: all 0.3s;
        }

        .google-btn:hover { transform: translateY(-3px); }

        /* ==================== MAIN APP ==================== */
        .app-page { display: none; min-height: 100vh; }
        .app-page.active { display: block; }

        .app-header {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }

        .app-content { display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 24px; max-width: 1400px; margin: 0 auto; }

        .file-browser { background: rgba(255, 255, 255, 0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .browser-header { padding: 20px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; }

        .file-list { max-height: 600px; overflow-y: auto; }
        .file-row { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; }
        .file-row:hover { background: rgba(66, 133, 244, 0.1); }
        .file-row.selected { background: rgba(66, 133, 244, 0.2); }

        .transfer-panel { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.1); height: fit-content; position: sticky; top: 100px; }

        .progress-info { margin-top: 16px; display: none; }
        .progress-info.active { display: block; }
        .progress-bar { height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #4285f4; width: 0%; transition: width 0.3s; }

        .btn-spinner { animation: spin 1s linear infinite; border: 3px solid rgba(255, 255, 255, 0.3); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .btn-spinner { display: inline-block; }
        .loading .btn-text { display: none; }

        .success-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .success-modal.active { display: flex; }
        .modal-box { background: #1a1a2e; padding: 40px; border-radius: 24px; text-align: center; }

        .form-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>

<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <i class="fab fa-google-drive"></i>
            </div>
            <h1>Drive Transfer</h1>
            <p>Move your files and folders deeply and securely.</p>
            <button class="google-btn" onclick="handleAuthClick()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
                <span>Sign in with Google</span>
            </button>
        </div>
    </div>

    <!-- MAIN APP PAGE -->
    <div id="appPage" class="app-page">
        <header class="app-header">
            <div class="header-left">
                <div class="header-logo"><i class="fab fa-google-drive"></i></div>
                <div class="header-title">
                    <h1>Drive Transfer</h1>
                    <span id="userEmail">Loading user...</span>
                </div>
            </div>
            <button class="logout-btn" onclick="handleSignoutClick()">Logout</button>
        </header>

        <main class="app-content">
            <div class="file-browser">
                <div class="browser-header">
                    <h2><i class="fas fa-folder-open"></i> My Drive</h2>
                    <button class="action-btn" onclick="loadFiles()">Refresh</button>
                </div>
                <div id="fileList" class="file-list">
                    <!-- Files will be loaded here -->
                </div>
            </div>

            <div class="transfer-panel">
                <h2>Transfer Details</h2>
                <input type="email" id="receiverEmail" class="form-input" placeholder="Receiver Email Address">
                <select id="permissionLevel" class="form-input">
                    <option value="writer">Share as Editor</option>
                    <option value="owner">Transfer Ownership (Deep)</option>
                </select>

                <button id="transferBtn" class="google-btn" style="background: #34a853; color: white;" onclick="startTransfer()">
                    <span class="btn-text">Start Deep Transfer</span>
                    <div class="btn-spinner"></div>
                </button>

                <div id="progressInfo" class="progress-info">
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                    <p id="progressText" style="font-size: 12px; margin-top: 5px; color: #aaa;">Starting...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="success-modal">
        <div class="modal-box">
            <i class="fas fa-check-circle" style="font-size: 50px; color: #34a853; margin-bottom: 20px;"></i>
            <h2 id="successMessage">Success!</h2>
            <br>
            <button class="google-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID'; // Replace with yours
        const API_KEY = 'YOUR_API_KEY';   // Replace with yours
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        let tokenClient;
        let accessToken = null;
        let selectedFiles = new Map();

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                accessToken = resp.access_token;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('appPage').classList.add('active');
                await loadFiles();
            };

            if (accessToken === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        }

        async function loadFiles() {
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '<div style="padding: 20px; text-align: center;">Scanning Drive...</div>';

            try {
                const response = await gapi.client.drive.files.list({
                    pageSize: 50,
                    fields: 'files(id, name, mimeType, size, modifiedTime)',
                    q: "'root' in parents and trashed = false"
                });

                const files = response.result.files;
                listDiv.innerHTML = '';

                if (files && files.length > 0) {
                    files.forEach(file => {
                        const row = document.createElement('div');
                        row.className = 'file-row';
                        row.onclick = () => toggleFile(file, row);
                        
                        const icon = file.mimeType.includes('folder') ? 'fa-folder' : 'fa-file';
                        row.innerHTML = `
                            <i class="fas ${icon}" style="font-size: 20px;"></i>
                            <div style="flex: 1;"><strong>${file.name}</strong></div>
                        `;
                        listDiv.appendChild(row);
                    });
                }
            } catch (err) {
                listDiv.innerHTML = 'Error loading files: ' + err.message;
            }
        }

        function toggleFile(file, element) {
            if (selectedFiles.has(file.id)) {
                selectedFiles.delete(file.id);
                element.classList.remove('selected');
            } else {
                selectedFiles.set(file.id, file);
                element.classList.add('selected');
            }
        }

        // ==========================================
        // DEEP RECURSIVE LOGIC
        // ==========================================

        let totalPendingItems = 0;
        let processedItems = 0;
        let errorList = [];

        async function startTransfer() {
            const receiverEmail = document.getElementById('receiverEmail').value;
            const permission = document.getElementById('permissionLevel').value;

            if (!receiverEmail || selectedFiles.size === 0) {
                alert("Please select files and enter a receiver email.");
                return;
            }

            if (permission === 'owner') {
                const confirmed = confirm("⚠️ DEEP OWNERSHIP TRANSFER\n\nThis will scan ALL subfolders and files inside your selection.\n\nNote: For personal @gmail accounts, folder ownership is often restricted. If so, they will be shared as 'Editor'.");
                if (!confirmed) return;
            }

            const btn = document.getElementById('transferBtn');
            const progressInfo = document.getElementById('progressInfo');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            btn.classList.add('loading');
            btn.disabled = true;
            progressInfo.classList.add('active');

            let files = Array.from(selectedFiles.values());
            processedItems = 0;
            totalPendingItems = files.length;
            errorList = [];

            for (let i = 0; i < files.length; i++) {
                await processItemRecursive(files[i], receiverEmail, permission);
            }

            btn.classList.remove('loading');
            progressInfo.classList.remove('active');
            progressFill.style.width = '0%';

            if (errorList.length === 0) {
                document.getElementById('successMessage').textContent = "Process Completed Successfully!";
                document.getElementById('successModal').classList.add('active');
            } else {
                alert(`Completed with ${errorList.length} notices. Check console for details.`);
            }
            btn.disabled = false;
        }

        async function processItemRecursive(item, email, role) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            try {
                progressText.textContent = `Processing: ${item.name}`;
                await shareFile(item.id, email, role);
                
                processedItems++;
                let progress = (processedItems / totalPendingItems) * 100;
                progressFill.style.width = progress + '%';

                if (item.mimeType === 'application/vnd.google-apps.folder') {
                    const children = await getFolderChildren(item.id);
                    if (children && children.length > 0) {
                        totalPendingItems += children.length;
                        for (const child of children) {
                            await processItemRecursive(child, email, role);
                        }
                    }
                }
            } catch (error) {
                console.warn(`Issue with ${item.name}:`, error.message);
                errorList.push(item.name);
                processedItems++;
            }
        }

        async function getFolderChildren(folderId) {
            const response = await gapi.client.drive.files.list({
                q: `'${folderId}' in parents and trashed = false`,
                fields: 'files(id, name, mimeType)',
                pageSize: 1000
            });
            return response.result.files || [];
        }

        async function shareFile(fileId, email, role) {
            const isOwnerRequest = (role === 'owner');
            
            // Standard Share (Writer) - Essential for invitations
            const shareRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=true`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'user', role: 'writer', emailAddress: email })
            });

            if (isOwnerRequest) {
                // Sending Ownership Invitation (pendingOwner System)
                await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=true`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'user', role: 'writer', emailAddress: email, pendingOwner: true })
                });
            }
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        window.onload = function () {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            });
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES });
        };
    </script>
</body>
</html>
