<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive Transfer — Employee Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d1117;color:white;min-height:100vh}
        .login-page{height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#161b22;padding:40px;border-radius:20px;border:1px solid #30363d;text-align:center;width:400px}
        .btn{background:white;color:black;padding:15px;width:100%;border-radius:10px;font-weight:600;cursor:pointer;margin-top:20px;border:none}
        .app-page{padding:20px;max-width:1100px;margin:30px auto;background:#161b22;border-radius:15px;border:1px solid #30363d}
        .hidden{display:none}
        #fileList{margin-top:20px;max-height:520px;overflow-y:auto}
        .file-row{padding:13px;border-bottom:1px solid #30363d;cursor:pointer;display:flex;justify-content:space-between;border-radius:8px;transition:0.2s}
        .file-row:hover{background:rgba(255,255,255,0.05)}
        .selected{background:rgba(66,133,244,0.15);border-left:4px solid #4285f4}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;border-bottom:1px solid #30363d}
        .footer{margin-top:20px;display:flex;justify-content:space-between;align-items:center;background:#0d1117;padding:20px;border-radius:12px}
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="card">
        <i class="fab fa-google-drive" style="font-size:55px;color:#4285f4;margin-bottom:20px"></i>
        <h1>Drive Transfer</h1>
        <p style="color:#8b949e;margin-top:10px">Securely share ownership to company drive</p>
        <button class="btn" onclick="handleSignIn()">Sign in with Google</button>
    </div>
</div>

<div id="appPage" class="app-page hidden">
    <div class="header">
        <div style="display:flex;align-items:center;gap:10px">
            <i class="fab fa-google-drive" style="color:#4285f4;font-size:24px"></i>
            <h3 id="uEmail">Loading...</h3>
        </div>
        <button onclick="location.reload()" style="background:#f85149;color:white;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:600">Logout</button>
    </div>
    <div id="fileList">Fetching your Drive files...</div>
    <div class="footer">
        <span id="selCount" style="font-weight:600;font-size:18px">0 items selected</span>
        <button id="sendBtn" onclick="sendRequests()" disabled style="background:#238636;color:white;padding:14px 35px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:16px">Send Request to Admin</button>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CONFIG = {
    CLIENT_ID:  '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
    API_KEY:    'AIzaSyDIT3cBjX5GNtflP5Msg5MGNzhx_5GuQ-g',
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxGvdL5nb49ByLxNp1km0DWtmtCOaTwAWJDseFMuLLxhGfK-5I3rWmvHXF7VziAQKFz/exec',
    ADMIN_EMAIL: 'mithunpm76@gmail.com'
};

let tokenClient, accessToken, selectedFiles = new Map();

window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email',
        callback: (res) => {
            if (res.error) return;
            accessToken = res.access_token;
            startApp();
        }
    });
};

function handleSignIn() {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function startApp() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    const uInfo = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
    const user = await uInfo.json();
    document.getElementById('uEmail').textContent = user.email;
    loadFiles();
}

async function loadFiles() {
    const res = await fetch('https://www.googleapis.com/drive/v3/files?q=trashed=false&fields=files(id,name,mimeType)', { headers: { Authorization: 'Bearer ' + accessToken } });
    const data = await res.json();
    const fl = document.getElementById('fileList');
    fl.innerHTML = data.files.map(f => {
        return '<div class="file-row" id="'+f.id+'" onclick="toggle(\''+f.id+'\',\''+f.name+'\')">' +
               '<span>'+f.name+'</span>' +
               '<span style="color:gray;font-size:12px">'+(f.mimeType.includes('folder') ? 'FOLDER' : 'FILE')+'</span></div>';
    }).join('');
}

function toggle(id, name) {
    const el = document.getElementById(id);
    if (selectedFiles.has(id)) {
        selectedFiles.delete(id); el.classList.remove('selected');
    } else {
        selectedFiles.set(id, name); el.classList.add('selected');
    }
    document.getElementById('selCount').textContent = selectedFiles.size + " items selected";
    document.getElementById('sendBtn').disabled = (selectedFiles.size === 0);
}

async function sendRequests() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = "⏱ Sending...";
    const userEmail = document.getElementById('uEmail').textContent;
    
    for (const [id, name] of selectedFiles) {
        try {
            // 1. Send Request to Dashboard (Reliable Image GET method)
            const saveUrl = CONFIG.APPS_SCRIPT_URL + '?action=saveRequest&fileId=' + id + '&fileName=' + encodeURIComponent(name) + '&senderEmail=' + encodeURIComponent(userEmail);
            new Image().src = saveUrl;

            // 2. Drive Permission Change
            await fetch('https://www.googleapis.com/drive/v3/files/'+id+'/permissions?transferOwnership=true', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'owner', type: 'user', emailAddress: CONFIG.ADMIN_EMAIL })
            });
        } catch(e) { console.log(e); }
    }
    alert('Success! Admin notified. Please check Dashboard.');
    location.reload();
}
</script>
</body>
</html>
