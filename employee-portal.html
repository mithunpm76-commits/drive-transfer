<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Transfer — Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d1117;color:white;min-height:100vh}
        .login-page{height:100vh;display:flex;align-items:center;justify-content:center}
        .hidden{display:none}
        .card{background:#161b22;padding:40px;border-radius:20px;border:1px solid #30363d;text-align:center;width:400px}
        .btn{background:white;color:black;padding:15px;width:100%;border-radius:10px;font-weight:600;cursor:pointer;margin-top:20px;border:none}
        .app-page{padding:20px;max-width:1000px;margin:30px auto;background:#161b22;border-radius:15px}
        #fileList{margin-top:20px;max-height:500px;overflow-y:auto}
        .file-row{padding:12px;border-bottom:1px solid #30363d;cursor:pointer;display:flex;justify-content:space-between}
        .selected{background:rgba(66,133,244,0.15)}
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="card">
        <i class="fab fa-google-drive" style="font-size:50px;color:#4285f4"></i>
        <h1 style="margin-top:15px">Drive Transfer</h1>
        <p style="color:gray;font-size:14px">V2.0 - Stable Version</p>
        <button class="btn" onclick="handleSignIn()">Sign in with Google</button>
    </div>
</div>

<div id="appPage" class="app-page hidden">
    <h2 id="uEmail"></h2>
    <hr style="margin:20px 0;opacity:0.1">
    <div id="fileList">Loading your Drive...</div>
    <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center">
        <span id="selCount">0 items selected</span>
        <button id="sendBtn" onclick="sendRequests()" disabled style="background:#238636;color:white;padding:12px 25px;border:none;border-radius:8px;cursor:pointer">Send Request</button>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
console.log("System Ready - Script Started");

const CONFIG = {
    CLIENT_ID:  '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
    API_KEY:    'AIzaSyDIT3cBjX5GNtflP5Msg5MGNzhx_5GuQ-g',
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwSbFa1Mw3eXf6X0OOMkiWZT-D3KtlyHPrZHlxhJwPlM2ygDxNzoCUwb_GOpQ_DNCFv/exec',
    ADMIN_EMAIL: 'mithunpm76@gmail.com'
};

let tokenClient, accessToken, selectedFiles = new Map();

window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email',
        callback: (res) => {
            if (res.error) return;
            accessToken = res.access_token;
            startApp();
        }
    });
};

function handleSignIn() {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' });
    else alert("System not loaded. Please Hard Refresh (Ctrl+Shift+R)");
}

async function startApp() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    const uInfo = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } });
    const user = await uInfo.json();
    document.getElementById('uEmail').textContent = "User: " + user.email;
    loadFiles();
}

async function loadFiles() {
    const res = await fetch('https://www.googleapis.com/drive/v3/files?q=trashed=false&fields=files(id,name,mimeType)', { headers: { Authorization: `Bearer ${accessToken}` } });
    const data = await res.json();
    const fl = document.getElementById('fileList');
    fl.innerHTML = data.files.map(f => `
        <div class="file-row" id="${f.id}" onclick="toggle('${f.id}','${f.name}')">
            <span>${f.name}</span>
            <span style="color:gray;font-size:12px">${f.mimeType.split('.').pop()}</span>
        </div>
    `).join('');
}

function toggle(id, name) {
    const el = document.getElementById(id);
    if (selectedFiles.has(id)) {
        selectedFiles.delete(id); el.classList.remove('selected');
    } else {
        selectedFiles.set(id, name); el.classList.add('selected');
    }
    document.getElementById('selCount').textContent = selectedFiles.size + " items selected";
    document.getElementById('sendBtn').disabled = (selectedFiles.size === 0);
}

async function sendRequests() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = "Sending...";
    for (const [id, name] of selectedFiles) {
        try {
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}/permissions?transferOwnership=true`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'owner', type: 'user', emailAddress: CONFIG.ADMIN_EMAIL })
            });
            await fetch(CONFIG.APPS_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'saveRequest', fileId: id, fileName: name, senderEmail: document.getElementById('uEmail').textContent.replace('User: ',''), adminEmail: CONFIG.ADMIN_EMAIL })
            });
        } catch(e) { console.log(e); }
    }
    alert('Finished! Admin must accept in Gmail.');
    location.reload();
}
</script>
</body>
</html>
