<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Transfer — Employee Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);min-height:100vh;color:#e6edf3}
        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-page.hidden{display:none}
        .login-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:50px 40px;width:100%;max-width:430px;text-align:center}
        .login-logo{width:88px;height:88px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
        .login-logo i{font-size:38px;color:white}
        .login-card h1{font-size:1.7rem;font-weight:700;margin-bottom:8px}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;padding:17px 24px;background:white;border:none;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:600;color:#374151;cursor:pointer}
        .google-btn img{width:24px;height:24px}
        .app-page{display:none;min-height:100vh}
        .app-page.active{display:block}
        .app-header{background:rgba(22,27,34,.95);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .header-logo{width:40px;height:40px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:10px;display:flex;align-items:center;justify-content:center}
        .header-logo i{font-size:17px;color:white}
        .user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);padding:5px 12px 5px 7px;border-radius:30px}
        .user-email{font-size:.8rem;color:rgba(255,255,255,.7)}
        .logout-btn{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.25);color:#f85149;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.78rem}
        .app-body{display:grid;grid-template-columns:1fr 360px;gap:22px;max-width:1280px;margin:0 auto;padding:24px}
        .file-browser{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden}
        .breadcrumb{padding:10px 22px;background:rgba(0,0,0,.15);font-size:.83rem}
        .file-list{max-height:520px;overflow-y:auto;padding:10px}
        .file-row{display:flex;align-items:center;gap:12px;padding:13px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:8px}
        .file-row:hover{background:rgba(66,133,244,.08)}
        .file-row.selected{background:rgba(66,133,244,.15)}
        .f-check{width:20px;height:20px;border:2px solid rgba(255,255,255,.25);border-radius:5px}
        .file-row.selected .f-check{background:#4285f4;border-color:#4285f4}
        .f-name{flex:1;font-size:.9rem}
        .open-btn{padding:5px 10px;background:rgba(255,255,255,.07);border:none;border-radius:6px;color:white;cursor:pointer}
        .send-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;height:fit-content;position:sticky;top:90px}
        .sel-count{background:linear-gradient(135deg,#4285f4,#34a853);border-radius:12px;padding:14px;margin-bottom:18px}
        .send-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1f6feb,#388bfd);border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer}
        .send-btn:disabled{opacity:.4;cursor:not-allowed}
    </style>
</head>
<body>

<div class="login-page" id="loginPage">
    <div class="login-card">
        <div class="login-logo"><i class="fab fa-google-drive"></i></div>
        <h1>Drive Transfer</h1>
        <p>Login to transfer file ownership to company drive</p>
        <button class="google-btn" onclick="handleSignIn()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">Sign in with Google
        </button>
    </div>
</div>

<div class="app-page" id="appPage">
    <header class="app-header">
        <div class="header-logo"><i class="fab fa-google-drive"></i></div>
        <div class="header-right">
            <div class="user-chip"><span class="user-email" id="userEmail"></span></div>
            <button class="logout-btn" onclick="handleSignOut()">Logout</button>
        </div>
    </header>

    <div class="app-body">
        <div class="file-browser">
            <div class="breadcrumb" id="breadcrumb">My Drive</div>
            <div class="file-list" id="fileList"></div>
        </div>
        <div class="send-panel">
            <div class="sel-count">Selected items: <span id="selNum">0</span></div>
            <button class="send-btn" id="sendBtn" onclick="sendRequests()" disabled>Send Ownership Request</button>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CONFIG = {
    CLIENT_ID:  '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
    API_KEY:    'AIzaSyDIT3cBjX5GNtflP5Msg5MGNzhx_5GuQ-g',
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyFvR7T5vwHlnZcp4kj27kNCGTCMm2wxrgEvcV3U0TUe_4_RpyOXUmjpkGheb3DztHY/exec',
    ADMIN_EMAIL: 'mithunpm76@gmail.com',
    SCOPES: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email'
};

let tokenClient, accessToken = null, currentUser = null;
let currentFolderId = 'root';
let folderStack = [{ id: 'root', name: 'My Drive' }];
let allFiles = [], selectedFiles = new Map();

window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: handleAuth
    });
};

function handleSignIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }
function handleSignOut() { location.reload(); }

async function handleAuth(r) {
    if (r.error) return;
    accessToken = r.access_token;
    const info = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { 
        headers: { Authorization: `Bearer ${accessToken}` } 
    });
    currentUser = await info.json();
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.add('active');
    loadFiles('root');
}

async function loadFiles(folderId) {
    currentFolderId = folderId;
    const fl = document.getElementById('fileList');
    fl.innerHTML = 'Loading...';
    try {
        const q = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType)&orderBy=folder,name`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        const data = await res.json();
        allFiles = data.files || [];
        renderFiles();
    } catch(e) { fl.innerHTML = 'Error: ' + e.message; }
}

function renderFiles() {
    const fl = document.getElementById('fileList');
    fl.innerHTML = allFiles.map(f => {
        const isFolder = f.mimeType.includes('folder');
        const sel = selectedFiles.has(f.id);
        return `<div class="file-row ${sel ? 'selected' : ''}" onclick="toggleFile(event,'${f.id}',${isFolder})">
            <div class="f-check"></div>
            <span class="f-name">${f.name}</span>
            ${isFolder ? `<button class="open-btn" onclick="event.stopPropagation();openFolder('${f.id}','${f.name}')">Open</button>` : ''}
        </div>`;
    }).join('');
}

function toggleFile(e, id, isFolder) {
    const f = allFiles.find(x => x.id === id);
    if (selectedFiles.has(id)) selectedFiles.delete(id);
    else selectedFiles.set(id, { id: f.id, name: f.name, isFolder });
    renderFiles(); updatePanel();
}

function updatePanel() {
    const items = Array.from(selectedFiles.values());
    document.getElementById('selNum').textContent = items.length;
    document.getElementById('sendBtn').disabled = (items.length === 0);
}

function openFolder(id, name) { folderStack.push({ id, name }); updateBreadcrumb(); loadFiles(id); }
function navTo(idx) { folderStack = folderStack.slice(0, idx+1); updateBreadcrumb(); loadFiles(folderStack[idx].id); }
function updateBreadcrumb() {
    document.getElementById('breadcrumb').innerHTML = folderStack.map((f, i) => `<span onclick="navTo(${i})" style="cursor:pointer">${f.name}</span>`).join(' › ');
}

async function sendRequests() {
    const items = Array.from(selectedFiles.values());
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = 'Sending...';

    let successCount = 0;
    for (const item of items) {
        try {
            await fetch(`https://www.googleapis.com/drive/v3/files/${item.id}/permissions?transferOwnership=true`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'owner', type: 'user', emailAddress: CONFIG.ADMIN_EMAIL })
            });

            await fetch(CONFIG.APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'saveRequest',
                    fileId: item.id,
                    fileName: item.name,
                    isFolder: item.isFolder,
                    senderEmail: currentUser.email,
                    adminEmail: CONFIG.ADMIN_EMAIL
                })
            });
            successCount++;
        } catch(e) { console.error(e); }
    }
    btn.disabled = false;
    btn.innerHTML = 'Send Ownership Request';
    alert('Success! ' + successCount + ' request(s) initiated. Admin must check Gmail to accept.');
    selectedFiles.clear();
    renderFiles();
    updatePanel();
}
</script>
</body>
</html>
