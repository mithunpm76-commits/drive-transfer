<!DOCTYPE html>
<html>
<body>
    <script src="https://accounts.google.com/gsi/client"></script>
    <button onclick="testLogin()" style="padding:20px; font-size:20px;">Test Login</button>

    <script>
    function testLogin() {
        alert("Button Clicked! Checking login system...");
        try {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive',
                callback: (res) => { alert("Login Success!"); }
            });
            client.requestAccessToken();
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
    </script>
</body>
</html>
