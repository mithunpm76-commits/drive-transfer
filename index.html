<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Drive Transfer - Secure & Deep</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; overflow-x: hidden; }
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 50px 40px; width: 100%; max-width: 420px; text-align: center; }
        .login-logo { width: 80px; height: 80px; background: linear-gradient(135deg, #4285f4, #34a853); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 0 30px rgba(66, 133, 244, 0.3); }
        .login-logo i { font-size: 34px; color: white; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px; background: white; border: none; border-radius: 12px; font-weight: 600; color: #374151; cursor: pointer; transition: 0.3s; }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .app-page { display: none; padding: 20px; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    <div id='appPage' class='app-page'>
        <div class='app-header'>
            <h2>My Files</h2>
            <button onclick='location.reload()' style='background: none; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 5px; cursor: pointer;'>Refresh</button>
        </div>
        <div class='app-content'>
            <div class='file-box'>
                <div id='fileContainer'>Loading...</div>
            </div>
            <div class='transfer-panel'>
                <h3>Transfer Options</h3>
                <p style='font-size: 12px; color: #aaa; margin: 10px 0;'>Target Email:</p>
                <input type='email' id='receiverEmail' class='input-field' placeholder='receiver@gmail.com'>
                <button id='startBtn' onclick='startTransfer()' class='google-btn' style='background: #34a853; color: white;'>
                    <span>Start Deep Transfer</span>
                    <div class='loading-spinner'></div>
                </button>
                <div id='progressBox' class='progress-container'>
                    <div class='progress-bar'><div id='progressFill' class='progress-fill'></div></div>
                    <p id='progressText' style='font-size: 12px; margin-top: 8px; text-align: center;'>Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <script src='https://apis.google.com/js/api.js'></script>
    <script src='https://accounts.google.com/gsi/client'></script>
    <script>
        const CLIENT_ID = '207254915996-nrkcvorfldhpmlfibbaq0h5eac7v528n.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyDdtnIAiIQq1yvKfo3ven2oAxkrikrJ9pY';
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        async function processRecursive(id, name, mime, email) {
            document.getElementById('progressText').innerText = 'Processing: ' + name;
            try {
                await fetch(\`https://www.googleapis.com/drive/v3/files/\${id}/permissions?sendNotificationEmail=true\`, {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'user', role: 'writer', emailAddress: email })
                });
            } catch(e) { console.error('Share failed', e); }
            try {
                await fetch(\`https://www.googleapis.com/drive/v3/files/\${id}/permissions?sendNotificationEmail=true\`, {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'user', role: 'writer', emailAddress: email, pendingOwner: true })
                });
            } catch(e) { console.error('Ownership invite failed', e); }
            if(mime === 'application/vnd.google-apps.folder') {
                const r = await gapi.client.drive.files.list({ q: \\\`\\\"\${id}\\\" in parents and trashed = false\\\`, fields: 'files(id, name, mimeType)' });
                for(let child of r.result.files) { await processRecursive(child.id, child.name, child.mimeType, email); }
            }
        }
        window.onload = () => {
            gapi.load('client', () => gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }));
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES });
        };
    </script>
</body>
</html>
