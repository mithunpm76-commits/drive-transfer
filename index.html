<!DOCTYPE html>

<body>
        <div id="loginPage">
                    <button onclick="handleAuth()">Login with Google</button>button>
        </div>div>
        <div id="appPage" style="display:none">
                    <div id="fileList"></div>div>
                    <input type="email" id="receiverEmail">
                    <button onclick="initiateTransfer()">Start Transfer</button>button>
        </div>div>
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script>
                    const CLIENT_ID = '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com';
                    const SCOPES = 'https://www.googleapis.com/auth/drive';
                    let accessToken = null;
                    const handleAuth = () => {
                                    google.accounts.oauth2.initTokenClient({
                                                        client_id: CLIENT_ID, scope: SCOPES,
                                                        callback: (r) => { accessToken = r.access_token; document.getElementById('loginPage').style.display='none'; document.getElementById('appPage').style.display='block'; fetchFiles(); }
                                    }).requestAccessToken();
                    };
                    const fetchFiles = async () => {
                                    const r = await fetch('https://www.googleapis.com/drive/v3/files?q="root" in parents', { headers: { 'Authorization': `Bearer ${accessToken}` } });
                                    const d = await r.json(); console.log(d);
                    };
                    const initiateTransfer = async () => { console.log('Transfer started'); };
        </script>
</body>
