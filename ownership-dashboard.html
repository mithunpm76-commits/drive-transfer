<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive Ownership — Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d1117;color:white;min-height:100vh}
        .header{background:#161b22;padding:20px 40px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
        .container{max-width:1300px;margin:30px auto;padding:0 30px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:35px}
        .stat-card{background:#161b22;padding:25px;border-radius:18px;border:1px solid #30363d;text-align:center}
        .stat-card h3{font-size:14px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:10px}
        .stat-card div{font-size:32px;font-weight:700}
        .tabs{display:flex;gap:10px;margin-bottom:30px}
        .tab-btn{padding:12px 25px;background:#161b22;border:1px solid #30363d;border-radius:12px;color:white;cursor:pointer;font-weight:600}
        .tab-btn.active{background:#1f6feb;border-color:#1f6feb}
        .requests-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));gap:20px}
        .card{background:#161b22;padding:25px;border-radius:18px;border:1px solid #30363d;transition:0.3s;animation:slideUp 0.4s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .card:hover{border-color:#1f6feb;transform:translateY(-5px)}
        .card-top{display:flex;gap:15px;margin-bottom:20px}
        .icon-box{width:50px;height:50px;background:rgba(56,139,253,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#58a6ff;font-size:20px}
        .card-actions{display:flex;gap:10px;margin-top:20px}
        .accept-btn{flex:2;padding:12px;background:#238636;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer}
        .reject-btn{flex:1;padding:12px;background:rgba(248,81,73,0.1);color:#f85149;border:1px solid rgba(248,81,73,0.2);border-radius:10px;cursor:pointer}
    </style>
</head>
<body>

<header class="header">
    <div style="display:flex;align-items:center;gap:15px">
        <div style="background:#1f6feb;padding:10px;border-radius:10px"><i class="fas fa-shield-alt"></i></div>
        <div><h2 style="font-size:18px">Drive Ownership Portal</h2><p style="font-size:12px;color:gray">Admin Dashboard</p></div>
    </div>
    <div id="uEmail" style="font-weight:600">Admin Login...</div>
</header>

<div class="container">
    <div class="stats">
        <div class="stat-card"><h3>Total Requests</h3><div id="statTotal" style="color:#58a6ff">-</div></div>
        <div class="stat-card"><h3>Pending</h3><div id="statPending" style="color:#d29922">-</div></div>
        <div class="stat-card"><h3>Accepted</h3><div id="statAccepted" style="color:#3fb950">-</div></div>
        <div class="stat-card"><h3>Rejected</h3><div id="statRejected" style="color:#f85149">-</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="loadRequests()">Pending Requests</button>
        <button class="tab-btn" onclick="alert('History coming soon!')">History / Logs</button>
    </div>

    <div class="requests-grid" id="requestsGrid">
        <div style="grid-column:1/-1;text-align:center;padding:50px;color:gray">Fetching requests...</div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CONFIG = {
    CLIENT_ID:  '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
    API_KEY:    'AIzaSyDIT3cBjX5GNtflP5Msg5MGNzhx_5GuQ-g',
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxF0xRLc0fbcj5qfjVsK1Y4oRWuce7ReHW8j7Cl0dX7gMuEtBBJpafNUOgjDF5WfPSZ/exec',
};

let accessToken;

window.onload = () => {
    const c = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email',
        callback: (res) => { accessToken = res.access_token; startApp(); }
    });
    c.requestAccessToken({prompt: 'consent'});
};

async function startApp() {
    const u = await (await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })).json();
    document.getElementById('uEmail').textContent = u.email;
    loadRequests();
}

async function loadRequests() {
    const data = await (await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getPending`)).json();
    document.getElementById('statTotal').textContent = data.stats.total;
    document.getElementById('statPending').textContent = data.stats.pending;
    document.getElementById('statAccepted').textContent = data.stats.accepted;
    document.getElementById('statRejected').textContent = data.stats.rejected;

    const grid = document.getElementById('requestsGrid');
    const pending = (data.requests || []).filter(r => r.status === 'pending');
    
    if (pending.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:gray"><i class="fas fa-check-circle" style="font-size:50px;display:block;margin-bottom:15px;opacity:0.2"></i>All caught up!</div>`;
        return;
    }

    grid.innerHTML = pending.map(req => `
        <div class="card">
            <div class="card-top">
                <div class="icon-box"><i class="fas fa-file-alt"></i></div>
                <div style="flex:1;min-width:0">
                    <h4 style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${req.filename}</h4>
                    <p style="font-size:12px;color:gray">${req.isfolder === 'Yes' ? 'Folder' : 'File'}</p>
                </div>
            </div>
            <div style="background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;font-size:13px">
                <div style="color:gray;font-size:10px;text-transform:uppercase;margin-bottom:3px">Sent by employee</div>
                <div style="color:#58a6ff;font-weight:600">${req.senderemail}</div>
            </div>
            <div class="card-actions">
                <button class="accept-btn" onclick="acceptTransfer('${req.id}')"><i class="fas fa-check"></i> Accept Ownership</button>
                <button class="reject-btn" onclick="updateStatus('${req.id}','rejected')"><i class="fas fa-times"></i> Reject</button>
            </div>
        </div>
    `).join('');
}

async function acceptTransfer(reqId) {
    try {
        await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=updateStatus&reqId=${reqId}&status=accepted&adminEmail=${document.getElementById('uEmail').textContent}`);
        alert('Ownership Transfer Confirmed!');
        loadRequests();
    } catch(e) { alert('Error updating status.'); }
}

async function updateStatus(reqId, status) {
    await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=updateStatus&reqId=${reqId}&status=${status}&adminEmail=${document.getElementById('uEmail').textContent}`);
    loadRequests();
}
</script>
</body>
</html>
