<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive Transfer — Employee Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d1117;color:white;min-height:100vh}
        .login-page{height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);padding:45px;border-radius:28px;border:1px solid rgba(255,255,255,0.08);text-align:center;width:420px;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
        .btn{background:white;color:black;padding:16px;width:100%;border-radius:12px;font-weight:700;cursor:pointer;margin-top:25px;border:none;transition:0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,255,255,0.2)}
        .app-page{max-width:1100px;margin:30px auto;background:#161b22;border-radius:20px;border:1px solid #30363d;overflow:hidden;animation:fadeIn 0.5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .hidden{display:none}
        .header{padding:20px 30px;background:rgba(255,255,255,0.02);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #30363d}
        #fileList{padding:15px;max-height:550px;overflow-y:auto}
        .file-row{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:10px;transition:0.2s}
        .file-row:hover{background:rgba(255,255,255,0.03)}
        .selected{background:rgba(56,139,253,0.1) !important;border:1px solid rgba(56,139,253,0.4)}
        .footer{padding:25px 35px;background:#0d1117;border-top:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
        .send-btn{background:#238636;color:white;padding:14px 40px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:0.3s}
        .send-btn:disabled{opacity:0.3;cursor:not-allowed}
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="card">
        <div style="background:#1f6feb;width:80px;height:80px;border-radius:20px;margin:0 auto 25px;display:flex;align-items:center;justify-content:center"><i class="fab fa-google-drive" style="font-size:40px;color:white"></i></div>
        <h1>Drive Transfer</h1>
        <p style="color:rgba(255,255,255,0.5);margin-top:10px">Secure Ownership Portal</p>
        <button class="btn" onclick="handleSignIn()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;vertical-align:middle;margin-right:10px">Sign in with Google</button>
    </div>
</div>

<div id="appPage" class="app-page hidden">
    <div class="header">
        <div style="display:flex;align-items:center;gap:15px">
            <div style="width:35px;height:35px;background:#1f6feb;border-radius:10px;display:flex;align-items:center;justify-content:center"><i class="fas fa-user" style="font-size:14px"></i></div>
            <h3 id="uEmail" style="font-weight:500">User Loading...</h3>
        </div>
        <button onclick="location.reload()" style="background:rgba(248,81,73,0.1);color:#f85149;border:1px solid rgba(248,81,73,0.2);padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:600">Logout</button>
    </div>
    <div id="fileList">Loading your items...</div>
    <div class="footer">
        <span id="selCount" style="font-size:18px;font-weight:600">0 Items Selected</span>
        <button id="sendBtn" onclick="sendRequests()" disabled class="send-btn">Send Transfer Request</button>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CONFIG = {
    CLIENT_ID:  '316518188310-ope33gher5kase39qfnqpca4tc3p5cta.apps.googleusercontent.com',
    API_KEY:    'AIzaSyDIT3cBjX5GNtflP5Msg5MGNzhx_5GuQ-g',
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxF0xRLc0fbcj5qfjVsK1Y4oRWuce7ReHW8j7Cl0dX7gMuEtBBJpafNUOgjDF5WfPSZ/exec',
    ADMIN_EMAIL: 'mithunpm76@gmail.com'
};

let tokenClient, accessToken, selectedFiles = new Map();

window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email',
        callback: (res) => { if(!res.error){ accessToken = res.access_token; startApp(); } }
    });
};

function handleSignIn() { if(tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' }); }

async function startApp() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    const u = await (await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: `Bearer ${accessToken}` } })).json();
    document.getElementById('uEmail').textContent = u.email;
    loadFiles();
}

async function loadFiles() {
    const data = await (await fetch('https://www.googleapis.com/drive/v3/files?q=trashed=false&fields=files(id,name,mimeType)', { headers: { Authorization: `Bearer ${accessToken}` } })).json();
    const fl = document.getElementById('fileList');
    fl.innerHTML = (data.files || []).map(f => {
        const escName = f.name.replace(/'/g, "\\'");
        const type = f.mimeType.includes('folder') ? 'FOLDER' : 'FILE';
        return `<div class="file-row" id="${f.id}" onclick="toggle('${f.id}','${escName}')">
            <span>${f.name}</span>
            <span style="color:rgba(255,255,255,0.4);font-size:12px;font-weight:600">${type}</span>
        </div>`;
    }).join('');
}

function toggle(id, name) {
    const el = document.getElementById(id);
    if(selectedFiles.has(id)){ selectedFiles.delete(id); el.classList.remove('selected'); }
    else{ selectedFiles.set(id, name); el.classList.add('selected'); }
    document.getElementById('selCount').textContent = selectedFiles.size + " Items Selected";
    document.getElementById('sendBtn').disabled = (selectedFiles.size === 0);
}

async function sendRequests() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = "⏱ Sending...";
    const userEmail = document.getElementById('uEmail').textContent;
    for (const [id, name] of selectedFiles) {
        try {
            const url = `${CONFIG.APPS_SCRIPT_URL}?action=saveRequest&fileId=${id}&fileName=${encodeURIComponent(name)}&senderEmail=${encodeURIComponent(userEmail)}`;
            new Image().src = url;
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}/permissions?transferOwnership=true`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'owner', type: 'user', emailAddress: CONFIG.ADMIN_EMAIL })
            });
        } catch(e) {}
    }
    alert('Request Sent to Admin Dashboard!');
    location.reload();
}
</script>
</body>
</html>
